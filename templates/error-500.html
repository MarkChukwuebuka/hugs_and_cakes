
<!DOCTYPE html>
<html lang="en">
    
<head>
        <!-- Meta Tags -->
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Title -->
        <title>{{title}} | {{app_config.app_name}}</title>

        <!-- CSS Files -->
        <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static 'assets/css/swiper-bundle.min.css' %}">
        <link rel="stylesheet" href="{% static 'assets/css/tabler-icons.min.css' %}">
        <link rel="stylesheet" href="{% static 'assets/css/scrollCue.css' %}">
        <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
        <link rel="stylesheet" href="{% static 'assets/css/responsive.css' %}">

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}">
    </head>
    <body>
        <!-- Scroll Smoother -->
        <div class="has-smooth" id="has_smooth"></div>
        <!-- Start Top Header Area -->

        <!-- Start Preloader Area -->
        <div id="preloader">
			<div id="container" class="container-preloader">
				<div class="animation-preloader">
					<div class="spinner"></div>
					<div class="txt-loading">
					</div>
				</div>	
				<div class="loader-section section-left"></div>
				<div class="loader-section section-right"></div>
			</div>
		</div>	
        <!-- End Preloader Area -->
        
        <!-- Start 404 Error page -->
        <div class="error-area pb-120 pt-100">
            <div class="container">
                <div class="error-content-wrap">
                    <img class="error-image mb-5" src="{% static 'assets/images/error-image.png' %}" alt="image" style="max-width: 500px;">
                    <h4 class="fs-32 fw-bold lh-1">Server Error</h4>

                    <p>Oops!!! We just encountered a server error, it's not your fault. <br>
                    Please contact support if this issue still persists.</p>

                    <a href="{% url 'home' %}" class="default-btn">Go To Homepage</a>
                </div>
            </div>
        </div>
        <!-- End 404 Error page -->
         
        <!-- JS Files -->
        <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
        <script src="{% static 'assets/js/swiper-bundle.min.js' %}"></script>
        <script src="{% static 'assets/js/scrollCue.min.js' %}"></script>
        <script src="{% static 'assets/js/smoothscroll.min.js' %}"></script>
        <script src="{% static 'assets/js/fslightbox.min.js' %}"></script>
        <script src="{% static 'assets/js/scrollCue.min.js' %}"></script>
        <script src="{% static 'assets/js/feedo.js' %}"></script>
    </body>

</html>
