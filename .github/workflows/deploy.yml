name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.INTERSERVER_HC_VPS_HOST }}
          username: ${{ secrets.INTERSERVER_HC_VPS_USERNAME }}
          key: ${{ secrets.INTERSERVER_HC_VPS_SSH_KEY }}
          port: ${{ secrets.INTERSERVER_HC_VPS_PORT }}
          script: |
            cd /var/www/hugs_and_cakes
            chmod +x deploy.sh
            ./deploy.sh